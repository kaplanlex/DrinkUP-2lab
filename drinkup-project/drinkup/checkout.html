<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrinkUp — оформлення замовлення</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body data-page="checkout">
  <div class="app-frame checkout-frame">
    <header class="top-panel">
      <a class="icon-back" href="cart.html" aria-label="Повернутися до товару">‹</a>
      <strong>Оформлення замовлення</strong>
    </header>

    <main class="checkout-main">
      <section class="order-summary" aria-label="Ваше замовлення">
        <div>
          <span class="muted">Товар:</span>
          <strong id="summaryName">Лимонад Fresh Lime</strong>
        </div>

        <div class="summary-row">
          <span>Ціна: <strong id="summaryPrice">89 грн</strong></span>
          <div class="quantity small" aria-label="Кількість товару">
            <button class="quantity-btn" type="button" data-checkout-qty="minus" aria-label="Зменшити кількість">−</button>
            <span id="checkoutQuantity">1</span>
            <button class="quantity-btn" type="button" data-checkout-qty="plus" aria-label="Збільшити кількість">+</button>
          </div>
        </div>

        <div class="total-row">
          <span>До сплати:</span>
          <strong id="summaryTotal">89 грн</strong>
        </div>
      </section>

      <form class="checkout-form" id="checkoutForm" novalidate>
        <label class="field">
          <span>Ваше імʼя:</span>
          <input type="text" name="name" autocomplete="name" />
          <small class="field-error" data-error="name"></small>
        </label>

        <label class="field">
          <span>E-mail:</span>
          <input type="email" name="email" autocomplete="email" />
          <small class="field-error" data-error="email"></small>
        </label>

        <label class="field">
          <span>Телефон:</span>
          <input type="tel" name="phone" autocomplete="tel" placeholder="+380..." />
          <small class="field-error" data-error="phone"></small>
        </label>

        <label class="field">
          <span>Адреса доставки:</span>
          <input type="text" name="address" autocomplete="street-address" />
          <small class="field-error" data-error="address"></small>
        </label>

        <fieldset class="payment-fieldset">
          <legend>Спосіб оплати:</legend>

          <label class="radio-row">
            <input type="radio" name="payment" value="Готівка" checked />
            <span>Готівка</span>
          </label>

          <label class="radio-row">
            <input type="radio" name="payment" value="Картка" />
            <span>Картка</span>
          </label>

          <label class="radio-row">
            <input type="radio" name="payment" value="Apple Pay / Google Pay" />
            <span>Apple Pay / Google Pay</span>
          </label>
        </fieldset>

        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Підтвердити замовлення</button>
          <a class="btn btn-secondary" href="catalog.html">Скасувати</a>
        </div>
      </form>
    </main>
  </div>

  <div class="modal" id="successModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-card">
      <span class="modal-icon">✓</span>
      <h2 id="modalTitle">Замовлення прийнято!</h2>
      <p id="modalText">Ми вже готуємо ваш напій. Очікуйте дзвінок оператора.</p>
      <a class="btn btn-primary" href="index.html" data-modal-home>На головну</a>
    </div>
  </div>
</body>
</html>
